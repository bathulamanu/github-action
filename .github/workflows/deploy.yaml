name: Deploy Changed Service

on:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.detect.outputs.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed service
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

          SERVICE=$(echo "$CHANGED_FILES" | grep -E '^service-(a|b|c)/' | cut -d/ -f1 | sort | uniq | head -n 1)

          echo "Detected: $SERVICE"

          if [ -z "$SERVICE" ]; then
            echo "No service changed"
            exit 1
          fi

          echo "service=$SERVICE" >> $GITHUB_OUTPUT

  build-push-deploy:
    needs: detect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set SERVICE variable
        run: echo "SERVICE=${{ needs.detect.outputs.service }}" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 198302589618.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t $SERVICE ./$SERVICE

      - name: Tag Image
        run: |
          docker tag $SERVICE:latest 198302589618.dkr.ecr.ap-south-1.amazonaws.com/$SERVICE:latest

      - name: Push to ECR
        run: |
          docker push 198302589618.dkr.ecr.ap-south-1.amazonaws.com/$SERVICE:latest

      # 🔥 COPY deploy.sh to EC2
      - name: Copy deploy.sh to EC2
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 400 key.pem

          scp -o StrictHostKeyChecking=no -i key.pem deploy.sh ubuntu@${{ secrets.EC2_IP }}:/home/ubuntu/

      # 🚀 RUN deploy.sh
      - name: Execute deploy script
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_IP }} << EOF

            chmod +x /home/ubuntu/deploy.sh

            echo "Deploying $SERVICE..."

            bash /home/ubuntu/deploy.sh $SERVICE

          EOF
