name: Auto Blue-Green Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Set service
      - name: Set service
        run: echo "SERVICE=service-a" >> $GITHUB_ENV

      # ✅ AWS login
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      # 🔥 Detect current environment
      - name: Detect current environment
        run: |
          CURRENT_TG=$(aws elbv2 describe-rules \
            --rule-arn ${{ secrets.RULE_ARN }} \
            --query 'Rules[0].Actions[0].TargetGroupArn' \
            --output text)

          echo "Current Target Group: $CURRENT_TG"

          if [ "$CURRENT_TG" == "${{ secrets.TG_BLUE }}" ]; then
            echo "CURRENT=BLUE" >> $GITHUB_ENV
            echo "TARGET=GREEN" >> $GITHUB_ENV
            echo "TARGET_TG=${{ secrets.TG_GREEN }}" >> $GITHUB_ENV
            echo "TARGET_IP=${{ secrets.EC2_GREEN_IP }}" >> $GITHUB_ENV
            echo "➡️ Deploying to GREEN"
          else
            echo "CURRENT=GREEN" >> $GITHUB_ENV
            echo "TARGET=BLUE" >> $GITHUB_ENV
            echo "TARGET_TG=${{ secrets.TG_BLUE }}" >> $GITHUB_ENV
            echo "TARGET_IP=${{ secrets.EC2_IP }}" >> $GITHUB_ENV
            echo "➡️ Deploying to BLUE"
          fi

      # ✅ Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 198302589618.dkr.ecr.ap-south-1.amazonaws.com

      # ✅ Build
      - name: Build Docker Image
        run: docker build -t $SERVICE ./$SERVICE

      # ✅ Tag
      - name: Tag Image
        run: |
          docker tag $SERVICE:latest \
          198302589618.dkr.ecr.ap-south-1.amazonaws.com/$SERVICE:latest

      # ✅ Push
      - name: Push to ECR
        run: |
          docker push 198302589618.dkr.ecr.ap-south-1.amazonaws.com/$SERVICE:latest

      # ✅ Prepare SSH key
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 400 key.pem

      # ✅ Copy deploy script
      - name: Copy deploy.sh to target
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem deploy.sh \
          ubuntu@$TARGET_IP:/home/ubuntu/

      # ✅ Deploy
      - name: Deploy to target
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$TARGET_IP << EOF
            chmod +x /home/ubuntu/deploy.sh
            echo "Deploying $SERVICE on $TARGET..."
            bash /home/ubuntu/deploy.sh $SERVICE
          EOF

      # ✅ Wait for health
      - name: Wait for target healthy
        run: |
          echo "Waiting for $TARGET to become healthy..."
          aws elbv2 wait target-in-service \
            --target-group-arn $TARGET_TG

      # 🔥 Switch traffic
      - name: Switch traffic
        run: |
          echo "Switching traffic to $TARGET..."
          aws elbv2 modify-rule \
            --rule-arn ${{ secrets.RULE_ARN }} \
            --actions Type=forward,TargetGroupArn=$TARGET_TG

      # ✅ Done
      - name: Done
        run: echo "🚀 Auto Blue-Green deployment complete"
